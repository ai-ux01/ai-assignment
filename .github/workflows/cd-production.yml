name: CD - Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        type: string

env:
  NODE_VERSION: '18.x'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/support-ticket-api

jobs:
  build-and-push:
    name: Build and Push Production Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=production-latest
            type=raw,value=${{ steps.version.outputs.version }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
      
      - name: Create release notes
        run: |
          echo "## Release ${{ steps.version.outputs.version }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Docker Image" >> release-notes.md
          echo "\`\`\`" >> release-notes.md
          echo "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> release-notes.md
          echo "\`\`\`" >> release-notes.md
          cat release-notes.md
      
      - name: Upload release notes
        uses: actions/upload-artifact@v3
        with:
          name: release-notes
          path: release-notes.md

  pre-deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    needs: [build-and-push]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify staging deployment
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          echo "Verifying staging environment is healthy..."
          curl -f $STAGING_URL/health || (echo "Staging is not healthy, aborting production deployment" && exit 1)
      
      - name: Check for critical issues
        run: |
          echo "Checking for blocking issues..."
          # Add any pre-deployment validation scripts here
          echo "Pre-deployment checks passed"

  deploy-production:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: [build-and-push, pre-deployment-checks]
    environment:
      name: production
      url: https://api.example.com/health
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
      
      - name: Create database backup
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /opt/support-ticket
            
            # Create pre-deployment backup
            ./scripts/backup-database.sh -c
            
            echo "Database backup completed"
          ENDSSH
      
      - name: Deploy to production server
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /opt/support-ticket
            
            # Pull latest image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            
            # Update docker-compose to use new version
            sed -i "s|image:.*support-ticket-api.*|image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}|g" docker-compose.production.yml
            
            # Rolling update (zero-downtime deployment)
            docker-compose -f docker-compose.production.yml up -d --no-deps --scale api=2 api
            
            # Wait for new containers to be healthy
            sleep 20
            
            # Scale down old containers
            docker-compose -f docker-compose.production.yml up -d --no-deps --scale api=1 api
            
            # Remove old containers
            docker-compose -f docker-compose.production.yml up -d
            
            echo "Production deployment completed successfully"
          ENDSSH
      
      - name: Verify deployment
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          # Wait for service to stabilize
          sleep 30
          
          # Test health endpoint
          for i in {1..5}; do
            if curl -f $PRODUCTION_URL/health; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          
          # Test critical API endpoints
          curl -f $PRODUCTION_URL/api/v1/tickets || exit 1
          
          echo "Production deployment verification passed"
      
      - name: Run smoke tests
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          # Create test ticket
          response=$(curl -s -X POST $PRODUCTION_URL/api/v1/tickets \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.TEST_TOKEN }}" \
            -d '{"title":"Deployment test","description":"Automated smoke test","priority":"Low"}')
          
          echo "Smoke test response: $response"
          
          # Verify response contains expected fields
          echo "$response" | jq -e '.id and .title and .state == "Open"' || exit 1
          
          echo "Smoke tests passed"
      
      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Production Deployment Successful",
              attachments: [{
                color: 'good',
                text: `Version: ${{ needs.build-and-push.outputs.version }}\nCommit: ${{ github.sha }}\nDeployed by: ${{ github.actor }}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [deploy-production]
    
    steps:
      - name: Tag successful deployment
        run: |
          echo "Production deployment completed successfully"
          echo "Version: ${{ needs.build-and-push.outputs.version }}"
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          release_name: Release ${{ needs.build-and-push.outputs.version }}
          draft: false
          prerelease: false

  rollback-production:
    name: Rollback Production (Manual Trigger)
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && github.event_name == 'workflow_dispatch'
    environment:
      name: production
    
    steps:
      - name: Confirm rollback
        run: |
          echo "⚠️ Rollback initiated due to deployment failure"
      
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
      
      - name: Rollback to previous version
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /opt/support-ticket
            
            # Pull previous stable image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:production-previous
            
            # Rollback to previous version
            docker-compose -f docker-compose.production.yml down
            docker-compose -f docker-compose.production.yml up -d
            
            # Verify rollback
            sleep 10
            curl -f http://localhost:3000/health || exit 1
            
            echo "Rollback completed successfully"
          ENDSSH
      
      - name: Restore database backup
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          ssh -i ~/.ssh/production_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /opt/support-ticket
            
            # List recent backups
            ls -lht data/backups/ | head -5
            
            # Restore most recent backup (if needed)
            # ./scripts/restore-database.sh data/backups/latest.sql.gz
            
            echo "Database backup available for manual restoration if needed"
          ENDSSH
      
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🔄 Production Rollback Executed",
              attachments: [{
                color: 'warning',
                text: `Deployment failed and was rolled back\nVersion: ${{ needs.build-and-push.outputs.version }}\nInitiated by: ${{ github.actor }}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
