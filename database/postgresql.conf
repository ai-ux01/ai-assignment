# ==============================================================================
# PostgreSQL Production Configuration
# ==============================================================================
# Optimized configuration for production deployment of Support Ticket System
# 
# This file contains performance tuning and reliability settings for production.
# Adjust based on your server specifications and workload patterns.
# ==============================================================================

# ==============================================================================
# Connection Settings
# ==============================================================================

# Maximum number of concurrent connections
max_connections = 100

# Connection authentication timeout (seconds)
authentication_timeout = 10s

# ==============================================================================
# Memory Settings
# ==============================================================================
# Adjust based on available server RAM
# General rule: shared_buffers = 25% of RAM, effective_cache_size = 50-75% of RAM

# Shared memory buffer (25% of RAM recommended)
shared_buffers = 256MB

# Planner's assumption of available OS cache (50-75% of RAM)
effective_cache_size = 1GB

# Memory for internal sort operations (per connection)
work_mem = 4MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 64MB

# ==============================================================================
# Write Ahead Log (WAL) Settings
# ==============================================================================
# These settings improve crash recovery and replication

# WAL level (minimal, replica, or logical)
wal_level = replica

# Checkpoint frequency (balance between performance and recovery time)
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9

# WAL buffer size
wal_buffers = 16MB

# Minimum size to trigger WAL file recycling
min_wal_size = 80MB
max_wal_size = 1GB

# ==============================================================================
# Query Planning
# ==============================================================================

# Random page cost (lower for SSD, default 4.0 for HDD)
random_page_cost = 1.1

# Sequential page cost
seq_page_cost = 1.0

# Enable parallel query execution
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 4

# ==============================================================================
# Logging
# ==============================================================================

# Log destination (stderr, csvlog, syslog)
log_destination = 'stderr'

# Logging collector for log rotation
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# Log rotation settings
log_rotation_age = 1d
log_rotation_size = 100MB

# What to log
log_min_duration_statement = 1000  # Log queries taking longer than 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'UTC'

# Log specific events
log_checkpoints = on
log_connections = off
log_disconnections = off
log_duration = off
log_lock_waits = on
log_statement = 'none'  # none, ddl, mod, all

# ==============================================================================
# Autovacuum
# ==============================================================================
# Automatic maintenance to prevent table bloat

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# Vacuum thresholds
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1

# ==============================================================================
# Statistics
# ==============================================================================

# Track query performance
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# ==============================================================================
# Client Connection Defaults
# ==============================================================================

# Timezone
timezone = 'UTC'

# Character encoding
client_encoding = 'UTF8'

# Locale settings
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# Default transaction isolation level
default_transaction_isolation = 'read committed'

# ==============================================================================
# Lock Management
# ==============================================================================

# Maximum number of locks per transaction
max_locks_per_transaction = 64

# Deadlock timeout
deadlock_timeout = 1s

# ==============================================================================
# Security
# ==============================================================================

# SSL (configure if using SSL)
ssl = off
# ssl_cert_file = '/path/to/server.crt'
# ssl_key_file = '/path/to/server.key'

# Password encryption
password_encryption = scram-sha-256

# ==============================================================================
# Performance Monitoring
# ==============================================================================

# Enable pg_stat_statements for query analysis (requires extension)
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# ==============================================================================
# Replication (if using streaming replication)
# ==============================================================================

# Streaming replication settings
# max_wal_senders = 3
# wal_keep_size = 128MB
# hot_standby = on

# ==============================================================================
# Notes
# ==============================================================================
# 
# After modifying this file:
# 1. Validate syntax: postgres --check-config -D /path/to/data
# 2. Reload configuration: SELECT pg_reload_conf(); or pg_ctl reload
# 3. Some settings require restart: pg_ctl restart
# 
# Monitor performance with:
# - SELECT * FROM pg_stat_activity;
# - SELECT * FROM pg_stat_database;
# - SELECT * FROM pg_stat_user_tables;
# - SELECT * FROM pg_stat_statements ORDER BY total_exec_time DESC LIMIT 10;
# 
# ==============================================================================
